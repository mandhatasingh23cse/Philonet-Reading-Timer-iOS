name: Build iOS Simulator App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select and Verify Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode.app || true
          xcodebuild -version

      - name: Inspect Project and Destinations
        run: |
          xcodebuild -list -project ReadLater.xcodeproj || true
          xcodebuild -showdestinations -project ReadLater.xcodeproj -scheme ReadLater || true

      - name: Build ReadLater Simulator Bundle
        run: |
          set +e
          echo "Building ReadLater for iOS Simulator with Ad-Hoc signing (-) and specific iPhone 16 destination..."
          xcodebuild -project ReadLater.xcodeproj \
            -scheme ReadLater \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CONFIGURATION_BUILD_DIR=build/Simulator \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "iPhone 16 destination build failed with exit code $STATUS. Attempting fallback simulator destination without specific name..."
            xcodebuild -project ReadLater.xcodeproj \
              -scheme ReadLater \
              -sdk iphonesimulator \
              CONFIGURATION_BUILD_DIR=build/Simulator \
              CODE_SIGN_ENTITLEMENTS="" \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=YES \
              CODE_SIGNING_ALLOWED=YES \
              PROVISIONING_PROFILE_SPECIFIER="" \
              DEVELOPMENT_TEAM="" \
              clean build 2>&1 | tee -a build.log
            STATUS=${PIPESTATUS[0]}
          fi
          if [ $STATUS -ne 0 ]; then
            echo "### ❌ Build Failed!" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 100 build.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit $STATUS
          fi

      - name: Package Simulator App into Zip
        run: |
          cd build/Simulator
          zip -r ReadLater-Simulator.zip ReadLater.app

      - name: Upload Simulator App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReadLater-Simulator
          path: build/Simulator/ReadLater-Simulator.zip

      - name: Upload Build Diagnostics Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
