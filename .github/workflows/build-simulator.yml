name: Build iOS Simulator App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode with iOS Simulator Support
        run: |
          FOUND_XCODE=""
          for xcode in /Applications/Xcode_16.2.app /Applications/Xcode_16.1.app /Applications/Xcode_16.0.app /Applications/Xcode_16.app /Applications/Xcode.app; do
            if [ -d "$xcode" ]; then
              echo "=== TESTING $xcode ==="
              sudo xcode-select -s "$xcode" || continue
              xcrun simctl list runtimes > /dev/null 2>&1 || true
              xcodebuild -showdestinations -project ReadLater.xcodeproj -scheme ReadLater > test_dest.log 2>&1 || true
              if grep -i -q "iOS Simulator" test_dest.log; then
                echo "SUCCESS: Found iOS Simulator destinations in $xcode!"
                cat test_dest.log | head -n 30
                FOUND_XCODE="$xcode"
                break
              else
                echo "No iOS Simulator destinations in $xcode"
              fi
            fi
          done
          if [ -z "$FOUND_XCODE" ]; then
            echo "Warning: No Xcode explicitly showed iOS Simulator in showdestinations. Defaulting to /Applications/Xcode_16.2.app or default..."
            sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app || true
            xcrun simctl list runtimes > /dev/null 2>&1 || true
          fi
          xcodebuild -version

      - name: Inspect Project Destinations
        run: |
          xcodebuild -showdestinations -project ReadLater.xcodeproj -scheme ReadLater > destinations.log 2>&1 || true
          cat destinations.log | head -n 40

      - name: Build ReadLater Simulator Bundle
        run: |
          set +e
          echo "Attempt 1: Building ReadLater universal simulator bundle (x86_64 + arm64)..."
          xcodebuild -project ReadLater.xcodeproj \
            -scheme ReadLater \
            -sdk iphonesimulator \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="x86_64 arm64" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "Attempt 1 failed ($STATUS). Attempt 2: Building using -destination 'generic/platform=iOS Simulator'..."
            xcodebuild -project ReadLater.xcodeproj \
              -scheme ReadLater \
              -sdk iphonesimulator \
              -destination 'generic/platform=iOS Simulator' \
              ONLY_ACTIVE_ARCH=NO \
              ARCHS="x86_64 arm64" \
              -derivedDataPath build/DerivedData \
              CODE_SIGN_ENTITLEMENTS="" \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=YES \
              CODE_SIGNING_ALLOWED=YES \
              PROVISIONING_PROFILE_SPECIFIER="" \
              DEVELOPMENT_TEAM="" \
              build 2>&1 | tee -a build.log
            STATUS=${PIPESTATUS[0]}
          fi
          if [ $STATUS -ne 0 ]; then
            echo "Attempt 2 failed ($STATUS). Attempt 3: Building using placeholder destination..."
            xcodebuild -project ReadLater.xcodeproj \
              -scheme ReadLater \
              -sdk iphonesimulator \
              -destination 'id=dvtdevice-DVTiOSDeviceSimulatorPlaceholder-iphonesimulator:placeholder' \
              ONLY_ACTIVE_ARCH=NO \
              ARCHS="x86_64 arm64" \
              -derivedDataPath build/DerivedData \
              CODE_SIGN_ENTITLEMENTS="" \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=YES \
              CODE_SIGNING_ALLOWED=YES \
              PROVISIONING_PROFILE_SPECIFIER="" \
              DEVELOPMENT_TEAM="" \
              build 2>&1 | tee -a build.log
            STATUS=${PIPESTATUS[0]}
          fi
          if [ $STATUS -ne 0 ]; then
            echo "### ❌ Build Failed!" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 100 build.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit $STATUS
          fi

      - name: Prepare Universal Appetize Bundle
        run: |
          APP_PATH=$(find build/DerivedData -name "ReadLater.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find ReadLater.app inside build/DerivedData"
            exit 1
          fi
          echo "Found compiled app at: $APP_PATH"
          file "$APP_PATH/ReadLater"
          
          mkdir -p build/AppetizeRoot
          cp -R "$APP_PATH" build/AppetizeRoot/ReadLater.app
          
          cd build/AppetizeRoot
          zip -ry ../ReadLater-Appetize-Ready.zip ReadLater.app
          cd ../..

      - name: Upload Appetize Enclosing Folder
        uses: actions/upload-artifact@v4
        with:
          name: ReadLater-Appetize
          path: build/AppetizeRoot/

      - name: Upload Pre-Zipped Appetize Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ReadLater-Appetize-Zip
          path: build/ReadLater-Appetize-Ready.zip

      - name: Upload and Push Diagnostic Logs on Failure/Always
        if: always()
        run: |
          if [ -f build.log ]; then
            echo "--- ANNOTATING ERRORS ---"
            grep -E "error:|xcodebuild: error:|fatal:|FAILED:" build.log | head -n 30 | while read -r line; do
              echo "::error title=Xcode Error::$line"
            done
          fi
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b ci-logs
          git add -f build.log destinations.log || true
          git commit -m "CI diagnostic logs [skip ci]" || true
          git push origin ci-logs --force || true

      - name: Upload Build Logs Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            destinations.log
