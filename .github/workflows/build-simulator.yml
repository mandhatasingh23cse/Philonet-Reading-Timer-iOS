name: Build iOS Simulator App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app || true

      - name: List Xcode Project Info
        run: xcodebuild -list -project ReadLater.xcodeproj

      - name: Build ReadLater Simulator Bundle
        run: |
          xcodebuild -project ReadLater.xcodeproj \
            -scheme ReadLater \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CONFIGURATION_BUILD_DIR=build/Simulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package Simulator App into Zip
        run: |
          cd build/Simulator
          zip -r ReadLater-Simulator.zip ReadLater.app

      - name: Upload Simulator App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReadLater-Simulator
          path: build/Simulator/ReadLater-Simulator.zip
